{% extends "base.html" %}
{% block content %}
<div class="row mb-5 pb-3 border-bottom">
    <div class="col-12">
        <div class="text-uppercase text-secondary fw-bold kicker mb-2">Analysis Engine</div>
        <h1 class="display-6 fw-bolder text-dark mb-0">New Benchmark Analysis</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white border-bottom-0 pt-4">
                <h5 class="fw-bold mb-0 text-dark">Configuration</h5>
            </div>
            <div class="card-body">
                <form id="evalForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Benchmark Module</label>
                        <select class="form-select bg-light" name="framework_type" required>
                            {% for fw_code, fw_meta in meta.items() %}
                                <option value="{{ fw_code }}">
                                    {{ fw_meta.sector }}: {{ fw_meta.title }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase text-muted">Upload Document</label>
                        <input class="form-control" type="file" name="file" id="file" required>
                    </div>
                    
                    <div class="form-check mb-4 mt-3">
                        <input class="form-check-input" type="checkbox" name="include_in_db" value="yes" id="includeInDb" checked>
                        <label class="form-check-label text-muted small" for="includeInDb">
                            Include this document in the public AfBench database.
                        </label>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold" id="submitBtn">
                        <span id="btnText">Run Analysis</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div id="loadingState" class="text-center py-5 d-none">
            <div class="spinner-border text-secondary mb-3" style="width: 3rem; height: 3rem;"></div>
            <h5 class="fw-bold text-dark">Processing Document...</h5>
            <p class="text-muted small">AfBench is analyzing the framework against selected criteria.</p>
        </div>

        <div id="resultsArea" class="d-none">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body text-center p-4">
                    <h2 id="countryName" class="fw-bold text-dark mb-3"></h2>
                    <div id="gaugeChart"></div>
                    <div id="summaryText" class="mt-4 text-start p-4 bg-light rounded text-secondary"></div>
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-12"><div class="card shadow-sm border-0 p-3" id="barChart"></div></div>
            </div>
            <div class="row mb-4">
                <div class="col-md-8 mx-auto"><div class="card shadow-sm border-0 p-3" id="radarChart"></div></div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white"><h5 class="fw-bold text-dark mb-0 pt-2">Detailed Results Matrix</h5></div>
                <div class="card-body table-responsive" id="dataTable"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
