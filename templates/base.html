<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfBench | Framework Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; font-size: 1.4rem; }
        .nav-link { font-weight: 500; font-size: 0.95rem; }
        .kicker { letter-spacing: 1.5px; font-size: 0.85rem; }
        .content-wrapper { flex: 1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">AfBench.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link px-3" href="/">Repository</a>
                    <a class="nav-link px-3" href="/evaluate">New Analysis</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-5 content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-center text-muted py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-1 small text-light"><strong>AfBench</strong> is an open-source policy benchmarking platform.</p>
            <p class="mb-0 small">
                <a href="https://github.com/dummy/afbench" class="text-secondary text-decoration-none hover-white">View Source Code on GitHub</a> • 
                <a href="#" class="text-secondary text-decoration-none hover-white">Documentation</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
