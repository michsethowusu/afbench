<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfBench | Policy Benchmarking Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* NEW: This completely replaces Bootstrap's default blue with a premium Deep Navy */
        :root {
            --bs-primary: #1A365D; 
            --bs-primary-rgb: 26, 54, 93;
        }
        .bg-primary { background-color: var(--bs-primary) !important; }
        .text-primary { color: var(--bs-primary) !important; }
        .border-primary { border-color: var(--bs-primary) !important; }
        .btn-primary { background-color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; }
        .btn-primary:hover { background-color: #11243f !important; border-color: #11243f !important; }
        .btn-outline-primary { color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-outline-primary:hover { background-color: var(--bs-primary); color: white; }
        .active.bg-primary { background-color: var(--bs-primary) !important; border-color: var(--bs-primary) !important; }

        body { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; font-size: 1.4rem; }
        .nav-link { font-weight: 500; font-size: 0.95rem; }
        .kicker { letter-spacing: 1.5px; font-size: 0.85rem; }
        .content-wrapper { flex: 1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                AfBench
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link px-3" href="/">Repository</a>
                    <a class="nav-link px-3" href="/evaluate">New Analysis</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-5 content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-center text-muted py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-1 small text-light"><strong>AfBench</strong> is an open-source policy benchmarking platform.</p>
            <p class="mb-0 small">
                <a href="#" class="text-secondary text-decoration-none hover-white">View Source Code on GitHub</a> • 
                <a href="#" class="text-secondary text-decoration-none hover-white">Documentation</a> • 
                <a href="#" id="adminSyncBtn" class="text-secondary text-decoration-none ms-2 hover-white">Sync</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
    document.getElementById('adminSyncBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        const confirmSync = confirm("Re-scan folders and synchronize the AfBench knowledge base?");
        if (!confirmSync) return;
        
        this.innerHTML = '⚙️ Syncing...';
        this.style.pointerEvents = 'none';
        
        try {
            const res = await fetch('/api/refresh_kb', { method: 'POST' });
            if(res.ok) {
                alert("Database Successfully Synchronized!");
                window.location.reload(); 
            } else {
                alert("Sync Failed.");
                this.innerHTML = '⚙️ Admin Sync';
                this.style.pointerEvents = 'auto';
            }
        } catch (err) { 
            alert('Error updating database.'); 
            this.innerHTML = '⚙️ Admin Sync';
            this.style.pointerEvents = 'auto';
        }
    });
    </script>
</body>
</html>
